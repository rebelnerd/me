<div class="auth-page">
  <!-- Floating ambient orbs -->
  <div class="auth-page__orb auth-page__orb--1"></div>
  <div class="auth-page__orb auth-page__orb--2"></div>
  <div class="auth-page__orb auth-page__orb--3"></div>

  <div class="auth-card">
    <div class="auth-card__brand">
      <img class="auth-card__logo" src="/me.png" alt="Me" />
    </div>

    <h1 class="auth-card__title">Begin your journey</h1>
    <p class="auth-card__subtitle">Create an account to get started</p>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="auth-name-row">
        <ds-text-input
          label="First Name"
          placeholder="John"
          [ngModel]="firstName()"
          (ngModelChange)="firstName.set($event)"
          name="firstName"
        />
        <ds-text-input
          label="Last Name"
          placeholder="Doe"
          [ngModel]="lastName()"
          (ngModelChange)="lastName.set($event)"
          name="lastName"
        />
      </div>
      <ds-text-input
        label="Email"
        type="email"
        placeholder="you@example.com"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        name="email"
      />
      <ds-text-input
        label="Password"
        type="password"
        placeholder="Create a password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        name="password"
      />
      <ds-button
        type="submit"
        [fullWidth]="true"
        [loading]="loading()"
        [disabled]="!email() || !password() || !firstName() || !lastName()"
      >
        Create Account
      </ds-button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Sign in</a>
    </p>
  </div>
</div>
