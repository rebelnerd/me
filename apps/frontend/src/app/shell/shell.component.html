<div class="shell">
  <ds-meditation-bg [scene]="scene()" intensity="normal" [animated]="true" />
  <header class="shell__header shell__header--mobile">
    <app-account-menu />
  </header>
  <main class="shell__content">
    <router-outlet />
  </main>
  <div class="shell__sidebar-wrap">
    <ds-bottom-nav
      [items]="navItems()"
      (navigated)="onNavigate($event)"
    />
    <div class="shell__sidebar-footer">
      <app-account-menu />
    </div>
  </div>

  <!-- Voice Capture FAB -->
  <button class="voice-fab" (click)="openVoiceCapture()" aria-label="Voice capture">
    <lucide-icon [img]="micIcon" [size]="24"></lucide-icon>
  </button>

  <!-- Voice Capture Modal -->
  @if (showVoiceCapture()) {
    <app-voice-capture-modal (closed)="closeVoiceCapture()" />
  }
</div>
